<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>emtekinc Booth</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/monada-dev/mona-font/dist/mona.css">
    <link rel="stylesheet" href="./style02.css">
</head>
<body>

    <div class="container">
        <div id="home-screen" class="screen">
            <div class="home-content">
                <img src="img02/title.png" class="title-gif" alt="Title">

                <div class="home-controls">
                    <img src="img02/btn1.png" id="enter-btn" class="custom-btn" alt="Enter">
                </div>
            </div>
        </div>

        <div id="booth-screen" class="screen" style="display:none;">
            <!-- <header><h2 class="booth-title">📸 emtekinc Booth 📸</h2></header> -->
            <div class="photo-wrapper">
                <div class="photo-zone" id="photo-zone">
                    <video id="video" autoplay playsinline muted></video>
                    <img id="preview-img" class="preview-overlay" alt="미리보기">
                    <div id="date-overlay" class="date-overlay"></div>
                    <img src="img02/frame.png" id="frame-img" class="frame-overlay" alt="프레임">
                </div>
            </div>
            
            <div class="controls">
                <img src="img02/btn2.png" id="snap-btn" class="custom-btn-sub" alt="Snap">
                
                <div id="preview-controls" style="display:none; width:100%; gap:12px; flex-direction:column; align-items:center;">
                    <img src="img02/btn3.png" id="save-btn" class="custom-btn-sub" alt="Save">
                    <img src="img02/btn4.png" id="retake-btn" class="custom-btn-sub" alt="Retake">
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script src="./script02.js"></script>
</body>
</html>
